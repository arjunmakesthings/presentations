  ## <mark>even people who are not typographically sensitive</mark> — such as the “casual consumers of onscreen information” — <mark>also attribute personality descriptors to typefaces</mark> (such as ‘courier-new’ feeling more cool, stiff, passive, as opposed to ‘poor richard’, which feels more active & exciting).

  <figcaption>Shaikh, Dawn, and Barbara Chaparro.
    “Perception of Fonts: Perceived Personality
    Traits and Appropriate Uses.” Digital Fonts
    and Reading, by Mary C Dyson and Ching
    Y Suen, WORLD SCIENTIFIC, 2016, pp.
    226–47. DOI.org (Crossref), https://doi.
    org/10.1142/9789814759540_0013.</figcaption>

  class: middle

  ## aekyoung kim & sam j. maglio have shown that <mark>letter-casing directly shapes the perception of a messenger’s gender</mark>; with lowercase letters feeling more feminine than uppercase ones (and vice-versa)

      /*this is used to create a slideshow. by default, it creates a slideshow for everything inside "source". all config options are here: https://github.com/gnab/remark/wiki/Configuration*/

      // get actual width and height of browser viewport (including any toolbars)
      const width = window.innerWidth;
      const height = window.innerHeight;

      // calculate the ratio as a string like "16:10"
      const gcd = (a, b) => (b === 0 ? a : gcd(b, a % b));
      let w = width;
      let h = height;
      const factor = gcd(w, h);
      w /= factor;
      h /= factor;

      const dynamicRatio = `${w}:${h}`;

      var slideshow = remark.create({
        // ratio: dynamicRatio,
        ratio: "16:9",
        slideNumberFormat: "",
        navigation: {
          scroll: false,
        },
      });
