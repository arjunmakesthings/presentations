detectMouse() {
    if (mouseX < companion.x + companion.r / 2 + leeway) &
        (mouseX > companion.x - companion.r / 2 - leeway) &
        (mouseY < companion.y + companion.r / 2 + leeway) &
        (mouseY > companion.y - companion.r / 2 - leeway) {
            mouseOnTarget = true;
        } else {
            mouseOnTarget = false;
        }
}
