  # awesome project #1:

  ---

  class: middle left

  ## this project draws attention to invisible phenomena that occurs in human-dominated environments. through intent, motion & force, a person can form a temporary relationship with one such phenomenon; and see the illuminatory effects that the relationship can have on humankind.

  ---

  class: top left

  # instructions:

  --

  - identify the highest point on the breadboard placed on the table.

  --

  - place your index finger of your dominant hand on the point.

  --

  - make sure that the center of the finger matches the center of the point.

  --

  - using consistent force, push your finger towards the ground below.

  --

  - when it is met with mechanical-resistance, gently lessen the force that is applied. you will notice the surface rising up on its own.

  --

  - when it is at the top, let go of the index finger and place it next to your body.

  --

  - now, focus on the change that has taken place. you should see a light-emitting-diode in one of two states: glowing or not glowing. 

  --

  - ...

  ---

  class: middle left

  # how (and why) to shut up & listen:
  .footnote.grey[by arjun; for ima-physical-computing; <br>at 
  new-york-university; april, 2026.]

  ---

  class: middle 

  ## Quite often I see artists who venture into interactive art start by making interactive artworks and offering interpretation in the notes beside them.
  .footnote.grey[borrowed from tom igoe's <a href = "https://www.tigoe.com/blog/category/physicalcomputing/405/">blogpost</a>.]

  ---

  class: middle 

  ## They’ll describe the work, then tell you what each element means,and what the participant will do with those elements.  They pre-script what will happen.
  
  .footnote.grey[borrowed from tom igoe's <a href = "https://www.tigoe.com/blog/category/physicalcomputing/405/">blogpost</a>.]

  ---

  class: middle

  ## When you do that, you’re telling the participant what to think, and by extension, how to act. Is that what you wanted?

  .footnote.grey[borrowed from tom igoe's <a href = "https://www.tigoe.com/blog/category/physicalcomputing/405/">blogpost</a>.]

  ---

  class: middle

  ## It’s a hard shift for some artists to think about making interactive work because we’re taught that a work of art is a work of expression. It’s a statement.  
  .footnote.grey[borrowed from tom igoe's <a href = "https://www.tigoe.com/blog/category/physicalcomputing/405/">blogpost</a>.]
  
  ---

  class: middle
  
  ## Interactive work is different. The thing you build, whether it’s a device or a whole environment, is just the beginning of a conversation with the people who experience your work.

  .footnote.grey[borrowed from tom igoe's <a href = "https://www.tigoe.com/blog/category/physicalcomputing/405/">blogpost</a>.]

  ---

  class: middle

  ## Your task in designing an interactive artwork is to give your audience the basic context, then get out of their way. 

  .footnote.grey[borrowed from tom igoe's <a href = "https://www.tigoe.com/blog/category/physicalcomputing/405/">blogpost</a>.]
  
  ---
  
  class: middle 
  
  ## Arrange the space, put in the items through they can take action, suggest a sequence of events through juxtaposition. If you want them to handle something, give it a handle. If they’re not supposed to touch something, don't make it approachable. If they’re supposed to discover something hidden, give hints. Remove anything extraneous.

  .footnote.grey[borrowed from tom igoe's <a href = "https://www.tigoe.com/blog/category/physicalcomputing/405/">blogpost</a>.]

  ---

  class: middle

  ## Once you’ve made your initial statement by building the thing or the environment and designing its behaviors, shut up. Let the audience listen to your work by taking it in through their senses ... Let them speak through their actions.

  .footnote.grey[borrowed from tom igoe's <a href = "https://www.tigoe.com/blog/category/physicalcomputing/405/">blogpost</a>.]

  ---

      /*this is used to create a slideshow. by default, it creates a slideshow for everything inside "source". all config options are here: https://github.com/gnab/remark/wiki/Configuration*/

      // get actual width and height of browser viewport (including any toolbars)
      const width = window.innerWidth;
      const height = window.innerHeight;

      // calculate the ratio as a string like "16:10"
      const gcd = (a, b) => (b === 0 ? a : gcd(b, a % b));
      let w = width;
      let h = height;
      const factor = gcd(w, h);
      w /= factor;
      h /= factor;

      const dynamicRatio = `${w}:${h}`;

      var slideshow = remark.create({
        // ratio: dynamicRatio,
        ratio: "16:9",
        slideNumberFormat: "",
        navigation: {
          scroll: false,
        },
      });
